
<!DOCTYPE html>
<html>
<head>
    <title>4 Frame Layout</title>
</head>

<!-- Divide page into 2 rows -->
<frameset rows="50%,50%">

    <!-- Top Row (2 columns) -->
    <frameset cols="50%,50%">
        <frame src="topleft.html">
        <frame src="topright.html">
    </frameset>

    <!-- Bottom Row (2 columns) -->
    <frameset cols="50%,50%">
        <frame src="bottomleft.html">
        <frame src="bottomright.html">
    </frameset>

</frameset>

</html>
